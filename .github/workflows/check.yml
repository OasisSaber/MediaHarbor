name: Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint check
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -v

      - name: Smoke test locate_root
        run: python skill/mediaharbor/scripts/locate_root.py --json

      - name: Smoke test check_tools
        run: python skill/mediaharbor/scripts/check_tools.py --json

  check-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint check
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -v

      - name: Smoke test locate_root
        run: python skill/mediaharbor/scripts/locate_root.py --json

      - name: Smoke test check_tools
        run: python skill/mediaharbor/scripts/check_tools.py --json

      - name: PowerShell validation
        run: powershell -ExecutionPolicy Bypass -File scripts/validate.ps1
